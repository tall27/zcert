name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.1.0)'
        required: true
        default: 'v1.1.0'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'

    - name: Get version
      id: version
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
        else
          echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        fi

    - name: Run tests
      run: |
        go test ./...

    - name: Build cross-platform binaries
      run: |
        chmod +x build-cross-platform.sh
        ./build-cross-platform.sh ${{ steps.version.outputs.VERSION }}

    - name: Create checksums
      run: |
        cd dist
        sha256sum * > checksums.txt

    - name: Create release notes
      run: |
        if [ -f "RELEASE_NOTES_${{ steps.version.outputs.VERSION }}.md" ]; then
          cp "RELEASE_NOTES_${{ steps.version.outputs.VERSION }}.md" release_notes.md
        else
          echo "Release ${{ steps.version.outputs.VERSION }}" > release_notes.md
          echo "" >> release_notes.md
          echo "## Changes" >> release_notes.md
          echo "- Enhanced RSA key size support (2048, 3072, 4096-bit)" >> release_notes.md
          echo "- Improved configuration validation" >> release_notes.md
          echo "- Comprehensive test coverage" >> release_notes.md
        fi

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.version.outputs.VERSION }}
        name: ZCERT ${{ steps.version.outputs.VERSION }}
        body_path: release_notes.md
        files: |
          dist/*
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: zcert-${{ steps.version.outputs.VERSION }}
        path: dist/